name: Audit MC Versions

on:
  workflow_dispatch:
    inputs:
      apply_suggestions:
        description: "Rewrite mc_versions from explicit plugin project metadata"
        required: true
        default: false
        type: boolean
      commit_report:
        description: "Commit the generated report"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Create audit script
        run: |
          mkdir -p scripts reports

          cat > scripts/audit-project-mc-versions.mjs <<'NODE'
          import fs from "node:fs";
          import path from "node:path";
          import child_process from "node:child_process";

          const APPLY = process.argv.includes("--apply");

          const REGISTRY = "data/plugins-and-themes.yml";
          const CACHE = ".cache/plugin-repos";
          const REPORT_JSON = "reports/project-mc-version-audit.json";
          const REPORT_MD = "reports/project-mc-version-audit.md";

          const KNOWN_MC_VERSIONS = [
            "1.20.1",
            "1.20.2",
            "1.20.3",
            "1.20.4",
            "1.20.5",
            "1.20.6",
            "1.21",
            "1.21.1",
            "1.21.2",
            "1.21.3",
            "1.21.4",
            "1.21.5",
            "1.21.6",
            "1.21.7",
            "1.21.8",
            "1.21.9",
            "1.21.10",
            "1.21.11",
          ];

          const KNOWN_SET = new Set(KNOWN_MC_VERSIONS);

          const EXPLICIT_VERSION_KEYS = [
            "mc_versions",
            "mcVersions",
            "mc_version",
            "mcVersion",
            "minecraft_versions",
            "minecraftVersions",
            "minecraft_version",
            "minecraftVersion",
            "supported_mc_versions",
            "supportedMcVersions",
            "supported_minecraft_versions",
            "supportedMinecraftVersions",
            "rusherhack_mc_versions",
            "rusherhackMcVersions",
            "rusherhack_mc_version",
            "rusherhackMcVersion",
            "rusherhack_minecraft_versions",
            "rusherhackMinecraftVersions",
            "rusherhack_minecraft_version",
            "rusherhackMinecraftVersion",
          ];

          const EXPLICIT_KEY_LOWER = new Set(EXPLICIT_VERSION_KEYS.map((key) => key.toLowerCase()));
          const EXPLICIT_KEY_NORMALIZED = new Set(
            EXPLICIT_VERSION_KEYS.map((key) => normalizeKey(key)),
          );

          function sh(command) {
            return child_process.execSync(command, {
              encoding: "utf8",
              stdio: "pipe",
            });
          }

          function shellQuote(value) {
            return `'${String(value).replaceAll("'", "'\\''")}'`;
          }

          function clean(value) {
            const trimmed = String(value ?? "").trim();

            if (
              (trimmed.startsWith("'") && trimmed.endsWith("'")) ||
              (trimmed.startsWith('"') && trimmed.endsWith('"'))
            ) {
              return trimmed.slice(1, -1).trim();
            }

            return trimmed;
          }

          function yamlQuote(value) {
            return `'${String(value).replaceAll("'", "''")}'`;
          }

          function normalizeKey(key) {
            return String(key)
              .trim()
              .replace(/[.-]/g, "_")
              .toLowerCase();
          }

          function isExplicitVersionKey(key) {
            const raw = String(key ?? "").trim();
            const lastSegment = raw.split(/[.]/).at(-1);

            return (
              EXPLICIT_KEY_LOWER.has(raw.toLowerCase()) ||
              EXPLICIT_KEY_NORMALIZED.has(normalizeKey(raw)) ||
              EXPLICIT_KEY_LOWER.has(String(lastSegment).toLowerCase()) ||
              EXPLICIT_KEY_NORMALIZED.has(normalizeKey(lastSegment))
            );
          }

          function expandRange(start, end) {
            const startIndex = KNOWN_MC_VERSIONS.indexOf(start);
            const endIndex = KNOWN_MC_VERSIONS.indexOf(end);

            if (startIndex === -1 || endIndex === -1 || startIndex > endIndex) {
              return [];
            }

            return KNOWN_MC_VERSIONS.slice(startIndex, endIndex + 1);
          }

          function sortVersions(versions) {
            return [...new Set(versions)]
              .filter((version) => KNOWN_SET.has(version))
              .sort((a, b) => KNOWN_MC_VERSIONS.indexOf(a) - KNOWN_MC_VERSIONS.indexOf(b));
          }

          function extractVersions(raw) {
            const text = String(raw ?? "");
            const versions = [];
            const ignored = [];

            for (const match of text.matchAll(/\b(\d+\.\d+(?:\.\d+)?)\s*-\s*(\d+\.\d+(?:\.\d+)?)\b/g)) {
              const expanded = expandRange(match[1], match[2]);

              if (expanded.length) {
                versions.push(...expanded);
              } else {
                ignored.push(match[0]);
              }
            }

            for (const match of text.matchAll(/\b\d+\.\d+(?:\.\d+)?\b/g)) {
              if (KNOWN_SET.has(match[0])) {
                versions.push(match[0]);
              } else {
                ignored.push(match[0]);
              }
            }

            return {
              versions: sortVersions(versions),
              ignored: [...new Set(ignored)],
            };
          }

          function formatVersions(versions) {
            return sortVersions(versions).join(", ");
          }

          function extractYamlValue(block, key, firstField = false) {
            const dash = firstField ? "(?:-\\s*)?" : "";
            const regex = new RegExp(`^\\s*${dash}${key}:\\s*(.*?)\\s*$`, "m");
            return clean(block.match(regex)?.[1] ?? "");
          }

          function normalizeRepo(raw) {
            let repo = clean(raw);

            repo = repo
              .replace(/^https:\/\/github\.com\//i, "")
              .replace(/^git@github\.com:/i, "")
              .replace(/\.git$/i, "")
              .replace(/^\/+|\/+$/g, "");

            return repo;
          }

          function parseRegistry(text) {
            const starts = [];
            const startRegex = /(?:^|\n)\s*-\s+name:\s*/g;

            let match;
            while ((match = startRegex.exec(text))) {
              starts.push(match.index + (match[0].startsWith("\n") ? 1 : 0));
            }

            const plugins = [];

            for (let i = 0; i < starts.length; i++) {
              const start = starts[i];
              const end = starts[i + 1] ?? text.length;
              const block = text.slice(start, end);

              if (!/^\s*mc_versions:\s*/m.test(block)) {
                continue;
              }

              const name = extractYamlValue(block, "name", true);
              const repo = normalizeRepo(extractYamlValue(block, "repo"));
              const mcVersions = extractYamlValue(block, "mc_versions");

              if (!name || !repo) {
                continue;
              }

              plugins.push({
                index: plugins.length,
                name,
                repo,
                registryMcVersionsRaw: mcVersions,
                blockStart: start,
                blockEnd: end,
              });
            }

            return plugins;
          }

          function repoCachePath(repo) {
            return path.join(CACHE, repo.replaceAll("/", "__"));
          }

          function cloneRepo(repo) {
            const target = repoCachePath(repo);

            if (fs.existsSync(path.join(target, ".git"))) {
              return target;
            }

            fs.mkdirSync(CACHE, { recursive: true });

            sh(`git clone --depth 1 ${shellQuote(`https://github.com/${repo}.git`)} ${shellQuote(target)}`);

            return target;
          }

          function walk(dir, depth = 0, out = []) {
            if (depth > 7) {
              return out;
            }

            let entries = [];
            try {
              entries = fs.readdirSync(dir, { withFileTypes: true });
            } catch {
              return out;
            }

            for (const entry of entries) {
              if (
                [".git", ".gradle", ".idea", "build", "out", "node_modules"].includes(entry.name)
              ) {
                continue;
              }

              const full = path.join(dir, entry.name);

              if (entry.isDirectory()) {
                walk(full, depth + 1, out);
              } else if (entry.isFile()) {
                out.push(full);
              }
            }

            return out;
          }

          function findCandidateFiles(projectDir) {
            return walk(projectDir)
              .map((file) => path.relative(projectDir, file))
              .filter((file) => {
                return (
                  file === "gradle.properties" ||
                  file.endsWith("/gradle.properties") ||
                  file === "rusherhack-plugin.json" ||
                  file.endsWith("/rusherhack-plugin.json")
                );
              })
              .sort((a, b) => filePriority(a) - filePriority(b) || a.localeCompare(b));
          }

          function filePriority(file) {
            if (file.endsWith("rusherhack-plugin.json")) {
              return 0;
            }

            if (file.endsWith("gradle.properties")) {
              return 1;
            }

            return 99;
          }

          function rawValueToString(value) {
            if (Array.isArray(value)) {
              return value.join(", ");
            }

            if (value && typeof value === "object") {
              return JSON.stringify(value);
            }

            return String(value ?? "");
          }

          function scanJsonObject(value, file, trail = []) {
            const findings = [];

            if (Array.isArray(value)) {
              for (let i = 0; i < value.length; i++) {
                findings.push(...scanJsonObject(value[i], file, [...trail, String(i)]));
              }

              return findings;
            }

            if (!value || typeof value !== "object") {
              return findings;
            }

            for (const [key, child] of Object.entries(value)) {
              const nextTrail = [...trail, key];

              if (isExplicitVersionKey(key)) {
                const raw = rawValueToString(child);
                const extracted = extractVersions(raw);

                if (extracted.versions.length) {
                  findings.push({
                    file,
                    key: nextTrail.join("."),
                    raw,
                    versions: extracted.versions,
                    ignored: extracted.ignored,
                    sourceType: "rusherhack-plugin-json",
                    priority: filePriority(file),
                  });
                }
              }

              findings.push(...scanJsonObject(child, file, nextTrail));
            }

            return findings;
          }

          function scanLooseJsonText(text, file) {
            const findings = [];

            for (const key of EXPLICIT_VERSION_KEYS) {
              const escaped = key.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const regex = new RegExp(
                `"${escaped}"\\s*:\\s*(\\[[^\\]]*\\]|"[^"]*"|[^,}\\n]+)`,
                "g",
              );

              let match;
              while ((match = regex.exec(text))) {
                const raw = clean(match[1].replace(/^\[/, "").replace(/\]$/, ""));
                const extracted = extractVersions(raw);

                if (extracted.versions.length) {
                  findings.push({
                    file,
                    key,
                    raw,
                    versions: extracted.versions,
                    ignored: extracted.ignored,
                    sourceType: "rusherhack-plugin-json-loose",
                    priority: filePriority(file),
                  });
                }
              }
            }

            return findings;
          }

          function inspectJsonFile(projectDir, file) {
            const full = path.join(projectDir, file);
            const text = fs.readFileSync(full, "utf8");

            try {
              return scanJsonObject(JSON.parse(text), file);
            } catch {
              return scanLooseJsonText(text, file);
            }
          }

          function inspectGradleProperties(projectDir, file) {
            const full = path.join(projectDir, file);
            const text = fs.readFileSync(full, "utf8");
            const findings = [];

            for (const line of text.split(/\r?\n/)) {
              const trimmed = line.trim();

              if (!trimmed || trimmed.startsWith("#")) {
                continue;
              }

              const match = trimmed.match(/^([A-Za-z0-9_.-]+)\s*=\s*(.+?)\s*$/);

              if (!match) {
                continue;
              }

              const [, key, raw] = match;

              if (!isExplicitVersionKey(key)) {
                continue;
              }

              const extracted = extractVersions(raw);

              if (extracted.versions.length) {
                findings.push({
                  file,
                  key,
                  raw: raw.trim(),
                  versions: extracted.versions,
                  ignored: extracted.ignored,
                  sourceType: "gradle-properties",
                  priority: filePriority(file),
                });
              }
            }

            return findings;
          }

          function inspectProject(repo) {
            let projectDir;

            try {
              projectDir = cloneRepo(repo);
            } catch (error) {
              return {
                ok: false,
                error: `repo unavailable: ${String(error.message ?? error)}`,
                files: [],
                findings: [],
              };
            }

            const files = findCandidateFiles(projectDir);
            const findings = [];

            for (const file of files) {
              try {
                if (file.endsWith("rusherhack-plugin.json")) {
                  findings.push(...inspectJsonFile(projectDir, file));
                } else if (file.endsWith("gradle.properties")) {
                  findings.push(...inspectGradleProperties(projectDir, file));
                }
              } catch (error) {
                findings.push({
                  file,
                  key: "",
                  raw: "",
                  versions: [],
                  ignored: [],
                  sourceType: "error",
                  priority: filePriority(file),
                  error: String(error.message ?? error),
                });
              }
            }

            return {
              ok: true,
              error: null,
              files,
              findings: dedupeFindings(findings),
            };
          }

          function dedupeFindings(findings) {
            const seen = new Set();
            const out = [];

            for (const finding of findings) {
              const id = [
                finding.file,
                finding.key,
                finding.raw,
                finding.versions?.join(","),
                finding.sourceType,
              ].join("\0");

              if (seen.has(id)) {
                continue;
              }

              seen.add(id);
              out.push(finding);
            }

            return out;
          }

          function chooseProjectSource(findings) {
            const usable = findings.filter((finding) => finding.versions?.length);

            if (!usable.length) {
              return {
                findings: [],
                versions: [],
                sourcePriority: null,
              };
            }

            const bestPriority = Math.min(...usable.map((finding) => finding.priority));
            const chosen = usable.filter((finding) => finding.priority === bestPriority);

            return {
              findings: chosen,
              versions: sortVersions(chosen.flatMap((finding) => finding.versions)),
              sourcePriority: bestPriority,
            };
          }

          function markdownCell(value) {
            return String(value ?? "")
              .replaceAll("|", "\\|")
              .replace(/\s+/g, " ")
              .trim();
          }

          function rewriteRegistry(originalText, plugins, results) {
            let rewritten = originalText;
            let changed = 0;

            for (const plugin of [...plugins].reverse()) {
              const result = results[plugin.index];

              if (!result?.hasExplicitProjectSource || !result.projectSuggestion) {
                continue;
              }

              const oldBlock = rewritten.slice(plugin.blockStart, plugin.blockEnd);
              const newBlock = oldBlock.replace(
                /^(\s*mc_versions:\s*).*?(\s*)$/m,
                `$1${yamlQuote(result.projectSuggestion)}$2`,
              );

              if (newBlock !== oldBlock) {
                rewritten =
                  rewritten.slice(0, plugin.blockStart) + newBlock + rewritten.slice(plugin.blockEnd);
                changed++;
              }
            }

            return { text: rewritten, changed };
          }

          if (!fs.existsSync(REGISTRY)) {
            console.error(`Missing registry file: ${REGISTRY}`);
            process.exit(1);
          }

          const originalRegistryText = fs.readFileSync(REGISTRY, "utf8");
          const plugins = parseRegistry(originalRegistryText);
          const results = [];

          console.log("===== MC VERSION PROJECT AUDIT =====");
          console.log(`Registry: ${REGISTRY}`);
          console.log(`Plugins with mc_versions: ${plugins.length}`);
          console.log(`Apply mode: ${APPLY ? "yes" : "no"}`);
          console.log("");

          for (const plugin of plugins) {
            const registryExtracted = extractVersions(plugin.registryMcVersionsRaw);
            const registryExpanded = formatVersions(registryExtracted.versions);

            const project = inspectProject(plugin.repo);
            const chosen = chooseProjectSource(project.findings);

            const projectSuggestion = formatVersions(chosen.versions);
            const hasExplicitProjectSource = Boolean(project.ok && chosen.findings.length && projectSuggestion);

            let status = "ok";

            if (!project.ok) {
              status = "repo-unavailable";
            } else if (!project.files.length) {
              status = "no-project-version-files";
            } else if (!hasExplicitProjectSource) {
              status = "no-explicit-project-version";
            } else if (registryExpanded !== projectSuggestion) {
              status = "registry-differs-from-project";
            }

            const result = {
              index: plugin.index,
              name: plugin.name,
              repo: plugin.repo,
              registry: plugin.registryMcVersionsRaw,
              registryExpanded,
              registryIgnored: registryExtracted.ignored,
              status,
              projectFilesChecked: project.files,
              projectError: project.error,
              hasExplicitProjectSource,
              projectSuggestion,
              chosenSources: chosen.findings.map((finding) => ({
                file: finding.file,
                key: finding.key,
                raw: finding.raw,
                versions: finding.versions,
                ignored: finding.ignored,
                sourceType: finding.sourceType,
              })),
              allProjectFindings: project.findings,
            };

            results.push(result);

            if (status === "registry-differs-from-project") {
              const source = result.chosenSources[0];
              console.log(`[diff] ${plugin.name}`);
              console.log(`  registry: ${plugin.registryMcVersionsRaw || "N/A"}`);
              console.log(`  project:  ${projectSuggestion}`);
              console.log(`  source:   ${source?.file ?? "N/A"} :: ${source?.key ?? "N/A"} = ${source?.raw ?? "N/A"}`);
            } else {
              console.log(`[${status}] ${plugin.name}`);
            }
          }

          let changed = 0;

          if (APPLY) {
            const rewrite = rewriteRegistry(originalRegistryText, plugins, results);
            fs.writeFileSync(REGISTRY, rewrite.text);
            changed = rewrite.changed;
          }

          const report = {
            generatedAt: new Date().toISOString(),
            apply: APPLY,
            registryLinesChanged: changed,
            registryFile: REGISTRY,
            knownMcVersions: KNOWN_MC_VERSIONS,
            explicitVersionKeys: EXPLICIT_VERSION_KEYS,
            pluginCount: plugins.length,
            results,
          };

          fs.mkdirSync(path.dirname(REPORT_JSON), { recursive: true });
          fs.writeFileSync(REPORT_JSON, `${JSON.stringify(report, null, 2)}\n`);

          const diffs = results.filter((result) => result.status === "registry-differs-from-project");
          const noExplicit = results.filter((result) => result.status === "no-explicit-project-version");
          const unavailable = results.filter((result) => result.status === "repo-unavailable");
          const noFiles = results.filter((result) => result.status === "no-project-version-files");

          const md = [];

          md.push("# MC Version Audit");
          md.push("");
          md.push(`Generated: ${report.generatedAt}`);
          md.push(`Apply mode: ${APPLY ? "yes" : "no"}`);
          md.push(`Registry lines changed: ${changed}`);
          md.push("");
          md.push("## Summary");
          md.push("");
          md.push(`- Plugins checked: ${plugins.length}`);
          md.push(`- Registry differs from explicit project source: ${diffs.length}`);
          md.push(`- No explicit project version found: ${noExplicit.length}`);
          md.push(`- No project version files found: ${noFiles.length}`);
          md.push(`- Repo unavailable: ${unavailable.length}`);
          md.push("");
          md.push("## Diffs");
          md.push("");

          if (!diffs.length) {
            md.push("No registry/project differences found.");
          } else {
            md.push("| Plugin | Repo | Registry | Project suggestion | Source file | Source key | Raw source value |");
            md.push("|---|---|---|---|---|---|---|");

            for (const result of diffs) {
              const source = result.chosenSources[0] ?? {};
              md.push(
                `| ${markdownCell(result.name)} | ${markdownCell(result.repo)} | ${markdownCell(result.registry)} | ${markdownCell(result.projectSuggestion)} | ${markdownCell(source.file)} | ${markdownCell(source.key)} | ${markdownCell(source.raw)} |`,
              );
            }
          }

          md.push("");
          md.push("## No explicit project version found");
          md.push("");

          if (!noExplicit.length) {
            md.push("None.");
          } else {
            md.push("| Plugin | Repo | Registry kept | Files checked |");
            md.push("|---|---|---|---|");

            for (const result of noExplicit) {
              md.push(
                `| ${markdownCell(result.name)} | ${markdownCell(result.repo)} | ${markdownCell(result.registry)} | ${markdownCell(result.projectFilesChecked.join(", "))} |`,
              );
            }
          }

          md.push("");
          md.push("## Repo / file warnings");
          md.push("");

          const warnings = [...unavailable, ...noFiles];

          if (!warnings.length) {
            md.push("None.");
          } else {
            md.push("| Plugin | Repo | Status | Note |");
            md.push("|---|---|---|---|");

            for (const result of warnings) {
              md.push(
                `| ${markdownCell(result.name)} | ${markdownCell(result.repo)} | ${markdownCell(result.status)} | ${markdownCell(result.projectError || result.projectFilesChecked.join(", "))} |`,
              );
            }
          }

          md.push("");

          fs.writeFileSync(REPORT_MD, `${md.join("\n")}\n`);

          console.log("");
          console.log("===== SUMMARY =====");
          console.log(`Diffs: ${diffs.length}`);
          console.log(`No explicit project version: ${noExplicit.length}`);
          console.log(`No project version files: ${noFiles.length}`);
          console.log(`Repo unavailable: ${unavailable.length}`);
          console.log(`Report Markdown: ${REPORT_MD}`);
          console.log(`Report JSON: ${REPORT_JSON}`);
          if (APPLY) {
            console.log(`Registry lines changed: ${changed}`);
          }
          NODE

      - name: Run audit
        run: |
          args=""

          if [ "${{ inputs.apply_suggestions }}" = "true" ]; then
            args="$args --apply"
          fi

          node scripts/audit-project-mc-versions.mjs $args

      - name: Add report to job summary
        run: cat reports/project-mc-version-audit.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc-version-audit
          path: |
            reports/project-mc-version-audit.json
            reports/project-mc-version-audit.md

      - name: Commit report / changes
        if: ${{ inputs.commit_report || inputs.apply_suggestions }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.commit_report }}" = "true" ]; then
            git add reports/project-mc-version-audit.json reports/project-mc-version-audit.md
          fi

          if [ "${{ inputs.apply_suggestions }}" = "true" ]; then
            git add data/plugins-and-themes.yml
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Audit Minecraft version metadata"
            git push
          fi
